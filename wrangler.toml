# ─── AutoLogin Scheduler — Cloudflare Worker Config ──────────────────
# Docs: https://developers.cloudflare.com/workers/wrangler/configuration/

name = "autologin-scheduler"
main = "src/worker/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

# ─── Database ────────────────────────────────────────────────────────────
# Option 1: Cloudflare D1 (default — free SQLite, 5GB)
#   Create: npx wrangler d1 create autologin-db
#   Push schema: npx wrangler d1 migrations apply DB --remote
[[d1_databases]]
binding = "DB"
database_name = "autologin-db"
database_id = ""
# ^ Filled automatically by wrangler deploy

# Option 2: Turso/libSQL — set these as wrangler secrets instead:
#   npx wrangler secret put TURSO_DATABASE_URL
#   npx wrangler secret put TURSO_AUTH_TOKEN
# When TURSO_DATABASE_URL is set, the app auto-uses Turso (no D1 binding needed).

# ─── R2 Bucket (OPTIONAL — screenshots) ─────────────────────────────────
# Uncomment to enable screenshot uploads:
# [[r2_buckets]]
# binding = "FILES_BUCKET"
# bucket_name = "autologin-screenshots"

# ─── Cron Triggers ──────────────────────────────────────────────────────
# Checks for due schedules every 6 hours.
[triggers]
crons = ["0 */6 * * *"]

# ─── Browser Rendering (Puppeteer) ──────────────────────────────────────
[browser]
binding = "BROWSER"

# ─── Vars (non-secret) ──────────────────────────────────────────────────
[vars]
ALLOW_REGISTRATION = "true"
FAKE_DATA = "true"
# Set FAKE_DATA = "false" before going to production!

# ─── Secrets (run wrangler secret put <NAME>) ────────────────────────────
# AUTH_SECRET          → JWT signing + AES encryption (openssl rand -hex 32)
# ADMIN_EMAIL          → admin bypass email
# ADMIN_PASSWORD       → admin bypass password
# TURSO_DATABASE_URL   → libsql://your-db.turso.io  (if using Turso over D1)
# TURSO_AUTH_TOKEN     → Turso auth token
# RESEND_API_KEY       → email alerts via Resend (100/day free)
# RESEND_FROM          → sender email
# BREVO_API_KEY        → email alerts via Brevo (300/day free)
# BREVO_FROM           → sender email
# SMTP_HOST / SMTP_USER / SMTP_PASS / SMTP_FROM → generic SMTP
# S3_ENDPOINT / S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY / S3_BUCKET_NAME
